<!DOCTYPE html>
<html>
<head>
  <title>Theke</title>
  <style>
    body { font-family: Arial; }
    .order {
  border: 1px solid #ccc;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  position: relative; /* 🔥 WICHTIG */
}
    .fertig {
      background: #2ecc71;
      color: white;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    .order-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  font-weight: bold;
  padding: 5px 0;
}

.order-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

.done-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
}
  </style>
</head>

<body>

<h1>🍺 Theke</h1>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 DIESE CONFIG FEHLT BEI DIR
const firebaseConfig = {
  apiKey: "AIzaSyBFJ6n7f3U3qpfezvqTgx9vugOpMSp284o",
  authDomain: "oberkellner-app.firebaseapp.com",
  projectId: "oberkellner-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const restaurantId = "AlteSchmiede";

const ordersDiv = document.getElementById("orders");

const tableListeners = {};

function startBarLive() {

  const barRef = collection(db, "restaurants", restaurantId, "bar");

  onSnapshot(barRef, (tablesSnap) => {

    tablesSnap.forEach(tableDoc => {

      const tableId = tableDoc.id;

      if (tableListeners[tableId]) return;

      let tableDiv = document.createElement("div");
      tableDiv.id = "table_" + tableId;
      tableDiv.innerHTML = `
  <h2 style="margin-left:15px;">
    🪑 Tisch ${tableId}
  </h2>
`;

      let contentDiv = document.createElement("div");
      tableDiv.appendChild(contentDiv);

      ordersDiv.appendChild(tableDiv);

      const unsub = onSnapshot(
        collection(db, "restaurants", restaurantId, "bar", tableId, "orders"),
        (ordersSnap) => {

          contentDiv.innerHTML = "";

          if (ordersSnap.empty) {
            tableDiv.remove();
            delete tableListeners[tableId];
            return;
          }

          ordersSnap.forEach(orderDoc => {

            let data = orderDoc.data();

            let orderDiv = document.createElement("div");
            orderDiv.className = "order";
            

            if (data.status === "fertig") {
              orderDiv.classList.add("fertig");
            }

orderDiv.innerHTML = "";

// 🔥 jede Position einzeln sauber darstellen
data.items.forEach(item => {

  let row = document.createElement("div");
  row.className = "order-row";

  row.innerHTML = `
    <span class="order-text">
      ${item.qty}x ${item.name}
    </span>
  `;

  orderDiv.appendChild(row);
});

            if (data.status !== "fertig") {

let btn = document.createElement("button");
btn.className = "done-btn";
btn.innerText = "✅ Fertig";

btn.onclick = async () => {

  // Theke fertig
  await updateDoc(
    doc(
      db,
      "restaurants",
      restaurantId,
      "bar",
      tableId,
      "orders",
      orderDoc.id
    ),
    { status: "fertig" }
  );

  // Tisch aktualisieren
  await updateDoc(
    doc(
      db,
      "restaurants",
      restaurantId,
      "bar",
      tableId
    ),
    { status: "fertig", updated: Date.now() }
  );

  // Service synchronisieren
  await updateDoc(
    doc(
      db,
      "restaurants",
      restaurantId,
      "tables",
      tableId,
      "orders",
      orderDoc.id
    ),
    { status: "fertig" }
  );
};

// 👉 ERST JETZT anhängen
orderDiv.appendChild(btn);

let footer = document.createElement("div");
footer.className = "order-footer";

footer.appendChild(btn);
orderDiv.appendChild(footer);
            }

            contentDiv.appendChild(orderDiv);
          });

        }
      );

      tableListeners[tableId] = unsub;
    });

  });
}

// 🚀 START
startBarLive();
// setInterval(loadBar, 2000);
</script>

</body>
</html>
