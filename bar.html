<!DOCTYPE html>
<html>
<head>
  <title>Theke</title>
  <link rel="manifest" href="manifest-bar.json">

<meta name="theme-color" content="#2c3e50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    body { font-family: Arial; }
  .order {
  border: 1px solid #444;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  position: relative;
  background: #34495e; /* 🔥 dunkles Grau-Blau */
}

.order-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  font-weight: bold;
  padding: 5px 0;
}

.done-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
}

.offen {
  background: #2be2e2;  /* 🔴 dunkleres Rot */
  color: rgb(3, 3, 3);
}

.fertig {
  background: #27ae60;  /* 🟢 angenehmeres Grün */
  color: white;
}
body {
  font-family: Arial;
  background: #ebecee;   /* 🔥 dunkler Hintergrund */
  color: rgb(27, 26, 26);
}
button {
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
  cursor: pointer;
  background: #ecf0f1;
  border: none;
  border-radius: 8px;
}
    @media (max-width: 768px) {

  .container {
    display: block !important;
  }

  .left, .right {
    width: 100% !important;
  }

  .right {
  width: 30%;
  padding: 10px;
  background: #16e7c4;  /* 🔥 dunkles Panel */
  border-radius: 10px;
}
#installBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
}
}
  </style>
</head>

<body>

<h1>🍺 Theke</h1>
<button id="installBtn" style="display:none; margin-bottom:10px;">
  📲 App installieren
</button>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 DIESE CONFIG FEHLT BEI DIR
const firebaseConfig = {
  apiKey: "AIzaSyBFJ6n7f3U3qpfezvqTgx9vugOpMSp284o",
  authDomain: "oberkellner-app.firebaseapp.com",
  projectId: "oberkellner-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const restaurantId = "AlteSchmiede";

const ordersDiv = document.getElementById("orders");

const tableListeners = {};

function startBarLive() {

  const barRef = collection(db, "restaurants", restaurantId, "bar");

  onSnapshot(barRef, (tablesSnap) => {

tablesSnap.forEach(async tableDoc => {

  const tableId = tableDoc.id;

  // 🔥 NEU: prüfen ob überhaupt noch Bestellungen existieren
  const ordersSnap = await getDocs(
    collection(db, "restaurants", restaurantId, "bar", tableId, "orders")
  );

  // ❌ KEINE Bestellungen → NICHT anzeigen
  if (ordersSnap.empty) {

    let existing = document.getElementById("table_" + tableId);
    if (existing) existing.remove();

    delete tableListeners[tableId];
    return;
  }

  if (tableListeners[tableId]) return;

      let tableDiv = document.createElement("div");
      tableDiv.id = "table_" + tableId;
      tableDiv.innerHTML = `
  <h2 style="margin-left:15px;">
    🪑 Tisch ${tableId}
  </h2>
`;

      let contentDiv = document.createElement("div");
      tableDiv.appendChild(contentDiv);

      ordersDiv.appendChild(tableDiv);

      const unsub = onSnapshot(
        collection(db, "restaurants", restaurantId, "bar", tableId, "orders"),
        (ordersSnap) => {

          contentDiv.innerHTML = "";

// 🔥 NEU: prüfen ob noch offene Bestellungen existieren
let hasOpenOrders = false;

ordersSnap.forEach(doc => {
  let data = doc.data();
  if (data.status !== "fertig") {
    hasOpenOrders = true;
  }
});

// ❌ ALLES FERTIG → Tisch entfernen
if (!hasOpenOrders) {
  tableDiv.remove();
  delete tableListeners[tableId];
  return;
}

          ordersSnap.forEach(orderDoc => {

            let data = orderDoc.data();

            // 🔥 FERTIGE BESTELLUNGEN AUSBLENDEN
            if (data.status === "fertig") return;

            let orderDiv = document.createElement("div");
            orderDiv.className = "order";
            

if (data.status === "fertig") {
  orderDiv.classList.add("fertig");
} else {
  orderDiv.classList.add("offen"); // 🔥 NEU
}
orderDiv.innerHTML = "";

// 🔥 jede Position einzeln sauber darstellen
data.items.forEach(item => {

  let row = document.createElement("div");
  row.className = "order-row";

  row.innerHTML = `
    <span class="order-text">
      ${item.qty}x ${item.name}
    </span>
  `;

  orderDiv.appendChild(row);
});

            if (data.status !== "fertig") {

let btn = document.createElement("button");
btn.className = "done-btn";
btn.innerText = "✅ Fertig";

btn.onclick = async () => {

  // Theke fertig
  await updateDoc(
    doc(
      db,
      "restaurants",
      restaurantId,
      "bar",
      tableId,
      "orders",
      orderDoc.id
    ),
    { status: "fertig" }
  );

  // Tisch aktualisieren
  await updateDoc(
    doc(
      db,
      "restaurants",
      restaurantId,
      "bar",
      tableId
    ),
    { status: "fertig", updated: Date.now() }
  );

  // Service synchronisieren
  await updateDoc(
    doc(
      db,
      "restaurants",
      restaurantId,
      "tables",
      tableId,
      "orders",
      orderDoc.id
    ),
    { status: "fertig" }
  );
};

// 👉 ERST JETZT anhängen
orderDiv.appendChild(btn);

let footer = document.createElement("div");
footer.className = "order-footer";

footer.appendChild(btn);
orderDiv.appendChild(footer);
            }

            contentDiv.appendChild(orderDiv);
          });

        }
      );

      tableListeners[tableId] = unsub;
    });

  });
}

// 🚀 START
startBarLive();
// setInterval(loadBar, 2000);


</script>


<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>


<script>
let deferredPrompt;

const installBtn = document.getElementById("installBtn");

// Event abfangen
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  installBtn.style.display = "block";
});

// Klick
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === "accepted") {
    console.log("Installiert ✅");
  }

  installBtn.style.display = "none";
});

// Wenn schon installiert → verstecken
window.addEventListener("appinstalled", () => {
  installBtn.style.display = "none";
});
</script>

</body>
</html>
</body>
</html>

</body>
</html>
