<!DOCTYPE html>
<html>
<head>
  <title>Theke</title>
  <style>
    body { font-family: Arial; }
    .order {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }
    .fertig {
      background: #2ecc71;
      color: white;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍺 Theke</h1>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 DIESE CONFIG FEHLT BEI DIR
const firebaseConfig = {
  apiKey: "AIzaSyBFJ6n7f3U3qpfezvqTgx9vugOpMSp284o",
  authDomain: "oberkellner-app.firebaseapp.com",
  projectId: "oberkellner-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const restaurantId = "AlteSchmiede";

const ordersDiv = document.getElementById("orders");

const tableListeners = {};

function startBarLive() {

  const barRef = collection(db, "restaurants", restaurantId, "bar");

  onSnapshot(barRef, (tablesSnap) => {

    tablesSnap.forEach(tableDoc => {

      const tableId = tableDoc.id;

      if (tableListeners[tableId]) return;

      let tableDiv = document.createElement("div");
      tableDiv.id = "table_" + tableId;
      tableDiv.innerHTML = `<h2>🪑 Tisch ${tableId}</h2>`;

      let contentDiv = document.createElement("div");
      tableDiv.appendChild(contentDiv);

      ordersDiv.appendChild(tableDiv);

      const unsub = onSnapshot(
        collection(db, "restaurants", restaurantId, "bar", tableId, "orders"),
        (ordersSnap) => {

          contentDiv.innerHTML = "";

          if (ordersSnap.empty) {
            tableDiv.remove();
            delete tableListeners[tableId];
            return;
          }

          ordersSnap.forEach(orderDoc => {

            let data = orderDoc.data();

            let orderDiv = document.createElement("div");
            orderDiv.className = "order";

            if (data.status === "fertig") {
              orderDiv.classList.add("fertig");
            }

            let items = data.items
              .map(i => `• ${i.name} x${i.qty}`)
              .join("<br>");

            orderDiv.innerHTML = items;

            if (data.status !== "fertig") {

              let btn = document.createElement("button");
              btn.innerText = "✅ Fertig";

btn.onclick = async () => {

                // Küche fertig
                await updateDoc(
                  doc(
                    db,
                    "restaurants",
                    restaurantId,
                    "bar",
                    tableId,
                    "orders",
                    orderDoc.id
                  ),
                  { status: "fertig" }
                );
                 await updateDoc(
                  doc(
                    db,
                    "restaurants",
                    restaurantId,
                    "bar",
                    tableId
                  ),
                  { status: "fertig",updated: Date.now()}
                );
                // 🔥 Service synchronisieren
                await updateDoc(
                  doc(
                    db,
                    "restaurants",
                    restaurantId,
                    "tables",
                    tableId,
                    "orders",
                    orderDoc.id
                  ),
                  { status: "fertig" }
                );
              };

              orderDiv.appendChild(document.createElement("br"));
              orderDiv.appendChild(btn);
            }

            contentDiv.appendChild(orderDiv);
          });

        }
      );

      tableListeners[tableId] = unsub;
    });

  });
}

// 🚀 START
startBarLive();
// setInterval(loadBar, 2000);
</script>

</body>
</html>
