<!DOCTYPE html>
<html>
<head>
  <title>Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest-service-AlteSchmiede.json">

<meta name="theme-color" content="#2c3e50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">



  <style>

    #categories button,
#categories div {
  padding: 6px 8px;
  margin: 1px;              /* 🔥 fast kein Abstand */
  font-size: 16px;          /* groß lassen */
  border-radius: 6px;
}
    body
     { font-family: Arial; 
      text-align: center;
      text-align: center;
      background: #f8fced;  /* 🔥 NEU dunkel */
      color: #191b1b;       /* 🔥 heller Text */ }
    
    button
     { padding: 8px; margin: 10px; 
      font-size: 18px;  background: #feffff;
      border: none;
      border-radius: 6px;
      color: #2c3e50; }
      
    .container { display: flex; }
    .left { width: 70%; padding: 10px; background: #ddd4d4;  }
    .right { width: 30%; padding: 10px; background: #f5f5f5; }

    @media (max-width: 768px) {

  .container {
    display: block !important;
  }

  .left, .right {
    width: 100% !important;
  }

  .right {
  width: 30%;
  padding: 10px;
  background: #16e7c4;  /* 🔥 dunkles Panel */
  border-radius: 10px;
}

}
#connectionStatus {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: green;
}

.right {
  position: relative;
}

/* Container unten */
.payment-bottom {
  position: relative;
  margin-top: 20px;
}

/* Button mittig & halb breit */
.pay-btn {
  display: block;
  width: 50%;
  margin: 0 auto;
  padding: 12px;
  font-size: 16px;
  
}

/* 🔥 JETZT WIRKLICH RECHTS IM ECK */
.footer-credit {
  position: absolute;
  right: 10px;
  bottom: 0;
  font-size: 10px;
  color: #999;
}
/* 🔥 Zahlungs-Positionen */
.pay-row {
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 10px;
  border-radius: 10px;
  background: #ffffff;
  margin-bottom: 8px;
  border: 1px solid #ddd;
}

/* 🔥 Name (darf umbrechen) */
.pay-name {
  flex: 1;
  text-align: left;
  font-weight: bold;
  font-size: 14px;

  white-space: normal;      /* 🔥 mehrere Zeilen */
  word-break: break-word;   /* 🔥 lange Wörter umbrechen */
}

/* 🔥 Preis fix rechts */
.pay-price {
  width: 70px;
  text-align: right;
  font-weight: bold;
}

/* 🔥 Entfernen Button */
.pay-remove {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: #fffefe;
  border: none;
  font-size: 18px;
  cursor: pointer;
}
#cart div {
  background: #d0deec;
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 8px;
}

#payment .pay-row {
  background: #adf59f;
}
#installBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
}
button {
  padding: 6px;
  margin: 0;   /* 🔥 GANZ WICHTIG */
  font-size: 18px;
}
.table-range {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* 🔥 Inputs ultra kompakt */
.table-input {
  width: 35px;
  height: 28px;
  padding: 0;
  text-align: center;
  border: 1px solid #666;
  border-radius: 0;       /* ❌ keine Rundung */
  font-size: 14px;
}

/* 🔥 Button gleiche Größe */
.table-btn {
  height: 28px;
  padding: 0 8px;
  font-size: 14px;
  border: 1px solid #666;
  border-radius: 0;
  background: #eee;
  cursor: pointer;
}

/* 🔥 Pfeile entfernen */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input[type=number] {
  -moz-appearance: textfield;
}
#tables {
  width: 100%;
  overflow: hidden;
}
  </style>
  
</head>

<body>

<h1>Bestellung</h1>
<button id="installBtn" style="display:none;">
  📲 App installieren
</button>
<select id="table" style="display:none;"></select>

<div id="categories"></div>

<h2 id="cartTitle">Warenkorb</h2>
<div id="cart"></div>
<h3 id="total">Neue Bestellung: 0€</h3>

<button onclick="sendOrder()">✅ Senden</button>

<hr>

<div id="connectionStatus"></div>
<div class="container">

  <!-- LINKS -->
  <div class="left">

<div style="
  display:flex;
  gap: 15px;
  align-items: center;
  margin-bottom: 15px;
">

  <h2 style="margin:0; margin-left:10px;">Tische</h2>

<div class="table-range">
  <input id="rangeStart" type="number" min="1" max="99"
    class="table-input" oninput="validateTableRange()">

  <span>-</span>

  <input id="rangeEnd" type="number" min="1" max="99"
    class="table-input" oninput="validateTableRange()">

  <button class="table-btn" onclick="renderTables()">OK</button>
</div>

</div>

<div id="tables"></div>
  </div>

  <!-- RECHTS -->
<div class="right">

  <div style="text-align:right; font-size:12px;">

  <!-- 🔥 UMSATZ -->
  <div id="salesBox" style="display:none;">
    📅 Heute: <span id="salesToday">0€</span><br>
    📆 Monat: <span id="salesMonth">0€</span>
  </div>

  <!-- 🔥 BUTTON DIREKT DARUNTER -->
  <!-- <button id="salesToggleBtn" onclick="toggleSales()" style="margin-top:5px; font-size:12px;">
    🔒 Umsatz anzeigen
  </button> -->

</div>

  <h2>💳 Zahlung</h2>

  <div id="payment"></div>

  <h3 id="payTotal">0€</h3>

  <button onclick="confirmPayment()">✅ Bezahlen</button>
<div class="footer-credit">
  built & designed by rootlo
</div>
</div>

</div>

<script type="module" src="service-AlteSchmiede.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let deferredPrompt;

const installBtn = document.getElementById("installBtn");

// 🔥 Event abfangen
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault(); // wichtig!
  deferredPrompt = e;

  // Button anzeigen
  installBtn.style.display = "block";
});

// 🔥 Klick auf Button
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === "accepted") {
    console.log("App installiert ✅");
  } else {
    console.log("Installation abgebrochen ❌");
  }

  deferredPrompt = null;
  installBtn.style.display = "none";
});

</script>
</body>
</html>
